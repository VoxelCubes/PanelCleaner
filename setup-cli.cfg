[metadata]
name = pcleaner-cli
version = attr: pcleaner.__version__
description = An AI-powered tool to clean manga panels.
long_description = file: README.md
long_description_content_type = text/markdown; charset=UTF-8; variant=GFM
url = https://github.com/VoxelCubes/PanelCleaner
keywords = image processing, cleaning, text removal, manga, ai, machine learning
license = "GPL-3.0-or-later"
license_files = LICENSE
classifiers =
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    Programming Language :: Python :: 3.12
    Programming Language :: Python :: 3.13
    Programming Language :: Python :: 3.14
    Operating System :: POSIX :: Linux
    Operating System :: MacOS :: MacOS X
    Operating System :: Microsoft :: Windows
    Natural Language :: English

[options]
install_requires =
    opencv-python
    huggingface_hub
    manga_ocr
    Pillow
    tqdm
    numpy
    scipy
    pyclipper
    shapely
    natsort
    docopt-ng
    ConfigUpdater
    loguru
    prettytable
    colorama
    requests
    xdg
    tifffile
    attrs
    psutil
    dictdiffer
    humanfriendly
    simple_lama_inpainting
    pytesseract
    psd-tools >= 1.11.0
    strenum; python_version < "3.11"
    pywin32; platform_system == "Windows"
    win10toast; platform_system == "Windows"
    pyuac; platform_system == "Windows"
    torch
    torchvision
python_requires = >=3.10
packages=find:

[options.extras_require]
DBUS =
    dbus-python; platform_system == "Linux"
LLM =
    # Optional "smart" OCR post-correction. Enables the --use-llm flag for the `pcleaner ocr` command.
    # Large models are loaded with airllm's layer-wise disk offloading, so they run on minimal RAM.
    airllm

; No data needed.
;[options.package_data]
;pcleaner = data/*

[options.packages.find]
exclude=
    tests*
    _testbed*
    pcleaner.gui*

[options.entry_points]
console_scripts =
    pcleaner-cli = pcleaner.main:main
